<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión PCs</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen">

    <header class="bg-indigo-700 text-white p-6 shadow-lg text-center">
        <h1 class="font-bold text-xl">Gestión de Equipos</h1>
        <button onclick="cargarDatos()" class="mt-2 bg-indigo-800 px-6 py-2 rounded-full text-sm font-bold">ACTUALIZAR 🔄</button>
    </header>

    <main id="contenedor-pcs" class="p-4 grid gap-4 max-w-md mx-auto">
        <p class="text-center text-slate-500 mt-10 font-bold italic">Cargando equipos...</p>
    </main>

    <div id="modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl">
            <h2 id="modal-titulo" class="text-xl font-bold mb-4 text-indigo-700 border-b pb-2"></h2>
            <form id="formPrestamo" class="space-y-4">
                <input type="hidden" id="pc-seleccionado">
                <input type="text" id="profe" placeholder="Profesor" required class="w-full p-3 border rounded-xl outline-indigo-500">
                <input type="text" id="alumno" placeholder="Alumno" required class="w-full p-3 border rounded-xl outline-indigo-500">
                <input type="text" id="grupo" placeholder="Grupo" required class="w-full p-3 border rounded-xl outline-indigo-500">
                <textarea id="obs" placeholder="Observaciones (opcional)" class="w-full p-3 border rounded-xl h-20 outline-indigo-500"></textarea>
                
                <div class="flex gap-2 pt-2">
                    <button type="button" onclick="cerrarModal()" class="flex-1 py-3 text-slate-400 font-bold">Cancelar</button>
                    <button type="submit" class="flex-1 bg-indigo-600 text-white py-3 rounded-xl font-bold shadow-md">CONFIRMAR</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // PEGA AQUÍ TU URL DE GOOGLE APPS SCRIPT
        const API_URL = "TU_URL_AQUI"; 

        async function cargarDatos() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                renderizar(data);
            } catch (e) {
                document.getElementById('contenedor-pcs').innerHTML = '<p class="text-center text-red-500 font-bold">⚠️ Error de conexión. Revisa la URL.</p>';
            }
        }

        function renderizar(pcs) {
            const lista = document.getElementById('contenedor-pcs');
            lista.innerHTML = '';
            pcs.forEach(pc => {
                const libre = pc[1] === 'LIBRE';
                lista.innerHTML += `
                    <div class="bg-white p-4 rounded-2xl shadow-sm border-l-8 ${libre ? 'border-green-500' : 'border-red-500'}">
                        <div class="flex justify-between items-center">
                            <div>
                                <h3 class="text-lg font-black text-slate-800">${pc[0]}</h3>
                                <p class="text-sm font-medium ${libre ? 'text-green-600' : 'text-slate-500'}">${libre ? 'DISPONIBLE' : pc[2]}</p>
                                ${pc[6] && pc[6] !== '-' ? `<p class="text-[10px] text-orange-600 font-bold mt-1 uppercase">⚠️ ${pc[6]}</p>` : ''}
                            </div>
                            <button onclick="${libre ? `abrirModal('${pc[0]}')` : `devolver('${pc[0]}','${pc[2]}')`}" 
                                class="px-4 py-2 rounded-xl font-black text-[10px] tracking-widest ${libre ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">
                                ${libre ? 'ASIGNAR' : 'DEVOLVER'}
                            </button>
                        </div>
                    </div>`;
            });
        }

        function abrirModal(id) {
            document.getElementById('pc-seleccionado').value = id;
            document.getElementById('modal-titulo').innerText = "ASIGNAR " + id;
            document.getElementById('modal').classList.remove('hidden');
        }

        function cerrarModal() { document.getElementById('modal').classList.add('hidden'); }

        document.getElementById('formPrestamo').onsubmit = async (e) => {
            e.preventDefault();
            const datos = {
                accion: "PRESTAMO",
                pc: document.getElementById('pc-seleccionado').value,
                profe: document.getElementById('profe').value,
                alumno: document.getElementById('alumno').value,
                grupo: document.getElementById('grupo').value,
                obs: document.getElementById('obs').value || "-"
            };
            cerrarModal();
            await enviar(datos);
        };

        async function devolver(id, alumno) {
            const obs = prompt("OBSERVACIONES DE DEVOLUCIÓN:", "Ninguna");
            if (obs !== null) {
                await enviar({ accion: "DEVOLUCION", pc: id, alumno: alumno, profe: "-", grupo: "-", obs: obs });
            }
        }

        async function enviar(datos) {
            document.getElementById('contenedor-pcs').innerHTML = '<p class="text-center text-indigo-500 mt-10 font-bold animate-pulse">PROCESANDO...</p>';
            await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(datos) });
            setTimeout(cargarDatos, 2000);
        }

        cargarDatos();
    </script>
</body>
</html>
