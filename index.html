<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gestión PCs</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen pb-20">

    <header class="bg-indigo-700 text-white p-6 sticky top-0 z-30 shadow-lg text-center font-bold text-xl">
        Gestión de Equipos (Sin Guiones)
        <button onclick="cargarDatos()" class="ml-4">🔄</button>
    </header>

    <main id="contenedor-pcs" class="p-4 grid gap-4 max-w-md mx-auto"></main>

    <div id="modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center p-4 z-40">
        <div class="bg-white rounded-2xl p-6 w-full max-w-sm">
            <h2 id="modal-titulo" class="text-xl font-bold mb-4"></h2>
            <form id="formPrestamo" class="space-y-3">
                <input type="hidden" id="pc-seleccionado">
                <input type="text" id="profe" placeholder="Profesor" required class="w-full p-3 border rounded-xl">
                <input type="text" id="alumno" placeholder="Alumno" required class="w-full p-3 border rounded-xl">
                <input type="text" id="grupo" placeholder="Grupo" required class="w-full p-3 border rounded-xl">
                <textarea id="obs" placeholder="Observaciones (ej: sin cargador...)" class="w-full p-3 border rounded-xl h-20"></textarea>
                <button type="submit" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold">Confirmar</button>
                <button type="button" onclick="cerrarModal()" class="w-full text-slate-400 py-2">Cancelar</button>
            </form>
        </div>
    </div>

    <script>
        const API_URL = "TU_URL_DE_APPS_SCRIPT"; // <--- PEGA TU URL AQUÍ

        async function cargarDatos() {
            const res = await fetch(API_URL);
            const data = await res.json();
            const lista = document.getElementById('contenedor-pcs');
            lista.innerHTML = '';
            data.forEach(pc => {
                const libre = pc[1] === 'LIBRE';
                lista.innerHTML += `
                    <div class="bg-white p-4 rounded-xl shadow-sm border-l-8 ${libre ? 'border-green-500' : 'border-red-500'}">
                        <div class="flex justify-between items-center">
                            <div>
                                <h3 class="text-lg font-bold">${pc[0]}</h3>
                                <p class="text-sm text-slate-500">${libre ? 'Libre' : pc[2]}</p>
                                ${pc[6] && pc[6] !== '-' ? `<p class="text-xs text-orange-600 font-bold mt-1">⚠️ ${pc[6]}</p>` : ''}
                            </div>
                            <button onclick="${libre ? `abrirModal('${pc[0]}')` : `devolver('${pc[0]}','${pc[2]}')`}" 
                                class="p-2 rounded-lg font-bold text-xs ${libre ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">
                                ${libre ? 'ASIGNAR' : 'DEVOLVER'}
                            </button>
                        </div>
                    </div>`;
            });
        }

        function abrirModal(id) {
            document.getElementById('pc-seleccionado').value = id;
            document.getElementById('modal-titulo').innerText = "Asignar " + id;
            document.getElementById('modal').classList.remove('hidden');
        }

        function cerrarModal() { document.getElementById('modal').classList.add('hidden'); }

        document.getElementById('formPrestamo').onsubmit = async (e) => {
            e.preventDefault();
            await enviar({
                accion: "PRESTAMO",
                pc: document.getElementById('pc-seleccionado').value,
                profe: document.getElementById('profe').value,
                alumno: document.getElementById('alumno').value,
                grupo: document.getElementById('grupo').value,
                obs: document.getElementById('obs').value || "-"
            });
            cerrarModal();
        };

        async function devolver(id, alumno) {
            const obs = prompt("Observaciones de devolución:", "Ninguna");
            if (obs !== null) await enviar({ accion: "DEVOLUCION", pc: id, alumno: alumno, obs: obs });
        }

        async function enviar(datos) {
            document.body.style.opacity = "0.5";
            await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(datos) });
            setTimeout(cargarDatos, 1500);
            document.body.style.opacity = "1";
        }

        cargarDatos();
    </script>
</body>
</html>
